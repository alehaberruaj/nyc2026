<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NYC 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --rojo: #D62828; --negro: #0D0D0D; --gris1: #1A1A1A; --gris2: #2E2E2E;
  --gris3: #6B6B6B; --gris4: #A0A0A0; --gris5: #E8E6E1; --gris6: #F5F3EE;
  --blanco: #FAFAF8; --amarillo: #F5C518; --verde: #2E7D32;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--blanco); color: var(--negro); max-width: 480px; margin: 0 auto; min-height: 100vh; }

.app-header { background: var(--negro); padding: 16px 20px 14px; position: sticky; top: 0; z-index: 100; }
.app-header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.app-title { color: white; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
.app-title span { color: var(--rojo); }
.app-dates { color: var(--gris4); font-size: 11px; margin-top: 3px; letter-spacing: 0.5px; }

.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.weather-badge { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.08); border-radius: 20px; padding: 4px 10px; cursor: pointer; border: none; color: white; font-size: 12px; font-weight: 500; }
.weather-icon { font-size: 14px; }

.days-nav { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.days-nav::-webkit-scrollbar { display: none; }
.day-pill { flex-shrink: 0; background: var(--gris2); border: none; color: var(--gris4); font-size: 12px; font-weight: 500; padding: 5px 11px; border-radius: 20px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.day-pill.active { background: var(--rojo); color: white; }

.content { padding: 0 0 40px; }
.day-section { display: none; }
.day-section.active { display: block; }

.day-hero { background: var(--negro); padding: 22px 20px 18px; border-bottom: 2px solid var(--rojo); }
.day-num { color: var(--rojo); font-size: 11px; font-weight: 700; letter-spacing: 2px; margin-bottom: 4px; }
.day-title { color: white; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; margin-bottom: 5px; }
.day-sub { color: var(--gris4); font-size: 13px; line-height: 1.4; }
.day-nota { margin-top: 12px; padding: 10px 14px; background: rgba(255,255,255,0.06); border-left: 2px solid var(--amarillo); border-radius: 0 6px 6px 0; }
.day-nota p { color: var(--gris4); font-size: 12px; line-height: 1.5; }
.day-nota strong { color: var(--amarillo); }

.day-weather { display: flex; align-items: center; gap: 10px; margin-top: 14px; padding: 10px 14px; background: rgba(255,255,255,0.05); border-radius: 8px; }
.day-weather-icon { font-size: 22px; }
.day-weather-temps { color: white; font-size: 14px; font-weight: 600; }
.day-weather-desc { color: var(--gris4); font-size: 12px; margin-top: 1px; }
.day-weather-rain { margin-left: auto; text-align: right; }
.day-weather-rain-pct { color: #64B5F6; font-size: 13px; font-weight: 600; }
.day-weather-rain-label { color: var(--gris4); font-size: 10px; }

.check-hint { text-align: center; color: var(--gris4); font-size: 11px; padding: 12px 20px 0; letter-spacing: 0.3px; }
.bloques { padding: 0 20px; }

.tramo-walk { display: flex; align-items: center; gap: 8px; padding: 10px 0 6px 44px; color: var(--gris3); font-size: 12px; }
.tramo-walk svg { flex-shrink: 0; }

.bloque { display: flex; gap: 14px; padding: 14px 0; border-bottom: 0.5px solid var(--gris5); cursor: pointer; position: relative; transition: opacity 0.2s; }
.bloque:last-child { border-bottom: none; }
.bloque.checked { opacity: 0.4; }
.bloque-left { display: flex; flex-direction: column; align-items: center; width: 30px; flex-shrink: 0; padding-top: 2px; }
.bloque-hora { font-size: 11px; font-weight: 700; color: var(--rojo); letter-spacing: 0.3px; white-space: nowrap; text-align: center; line-height: 1.2; }
.bloque-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gris5); border: 1.5px solid var(--gris4); margin-top: 6px; flex-shrink: 0; transition: all 0.2s; }
.bloque.checked .bloque-dot { background: var(--verde); border-color: var(--verde); }
.bloque-body { flex: 1; min-width: 0; }
.bloque-titulo { font-size: 15px; font-weight: 600; color: var(--negro); margin-bottom: 3px; line-height: 1.3; }
.bloque.checked .bloque-titulo { text-decoration: line-through; color: var(--gris3); }
.bloque-desc { font-size: 13px; color: var(--gris3); line-height: 1.5; margin-bottom: 6px; }
.bloque-maps { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; color: #1a73e8; text-decoration: none; padding: 3px 8px; border: 0.5px solid #c5d9f7; border-radius: 20px; background: #f0f6ff; }
.bloque-web { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:500; color:#6B6B6B; text-decoration:none; padding:3px 8px; border:0.5px solid var(--gris5); border-radius:20px; background:var(--gris6); }
.bloque-entrada { display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:600; color:#854F0B; padding:3px 8px; border:0.5px solid #FAC775; border-radius:20px; background:#FAEEDA; }
.bloque-badges { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }

.opciones { margin-top: 8px; }
.opcion { display: flex; gap: 8px; padding: 8px 10px; margin-bottom: 6px; background: var(--gris6); border-radius: 8px; border-left: 2px solid var(--gris5); }
.opcion-label { font-size: 11px; font-weight: 700; color: var(--rojo); letter-spacing: 0.5px; white-space: nowrap; padding-top: 1px; }
.opcion-text { font-size: 12px; color: var(--gris3); line-height: 1.4; }

.evento-especial { margin: 30px 20px; padding: 24px; background: var(--negro); border-radius: 12px; text-align: center; }
.evento-especial p { color: var(--gris4); font-size: 14px; line-height: 1.6; }

/* TABS EXTRA */
.extra-tabs { display: flex; border-bottom: 1px solid var(--gris5); background: white; position: sticky; top: 98px; z-index: 90; }
.extra-tab { flex: 1; padding: 11px 0; font-size: 12px; font-weight: 600; color: var(--gris4); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; letter-spacing: 0.3px; transition: all 0.15s; }
.extra-tab.active { color: var(--rojo); border-bottom-color: var(--rojo); }

/* PANEL CLIMA */
.panel { display: none; padding: 16px 20px; }
.panel.active { display: block; }

.clima-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.clima-card { background: var(--negro); border-radius: 12px; padding: 14px; }
.clima-card-fecha { color: var(--gris4); font-size: 11px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 8px; }
.clima-card-icon { font-size: 28px; margin-bottom: 6px; }
.clima-card-temps { color: white; font-size: 16px; font-weight: 700; }
.clima-card-temps span { color: var(--gris4); font-size: 13px; font-weight: 400; }
.clima-card-desc { color: var(--gris4); font-size: 11px; margin-top: 4px; line-height: 1.3; }
.clima-card-rain { display: flex; align-items: center; gap: 4px; margin-top: 6px; color: #64B5F6; font-size: 11px; font-weight: 600; }
.clima-loading { text-align: center; color: var(--gris4); font-size: 13px; padding: 30px 0; }

/* CONVERTIDOR */
.conv-section { margin-bottom: 20px; }
.conv-label { font-size: 11px; font-weight: 700; color: var(--gris4); letter-spacing: 1px; margin-bottom: 10px; }
.conv-rate-bar { background: var(--negro); border-radius: 10px; padding: 12px 16px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
.conv-rate-num { color: white; font-size: 18px; font-weight: 700; }
.conv-rate-label { color: var(--gris4); font-size: 12px; }
.conv-updated { color: var(--gris4); font-size: 10px; margin-top: 4px; }
.conv-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.conv-field label { display: block; font-size: 11px; font-weight: 700; color: var(--gris4); letter-spacing: 0.5px; margin-bottom: 6px; }
.conv-field input { width: 100%; padding: 12px 14px; background: var(--negro); border: none; border-radius: 10px; color: white; font-size: 18px; font-weight: 700; outline: none; }
.conv-field input::placeholder { color: var(--gris2); }
.conv-tips { margin-top: 16px; }
.conv-tip-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--gris5); }
.conv-tip-row:last-child { border-bottom: none; }
.conv-tip-usd { font-size: 14px; color: var(--gris3); }
.conv-tip-ils { font-size: 14px; font-weight: 600; color: var(--negro); }

/* HORARIO LLUVIA */
.hourly-title { font-size: 11px; font-weight: 700; color: #A0A0A0; letter-spacing: 1px; margin: 14px 0 8px; }
.hourly-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.hourly-scroll::-webkit-scrollbar { display: none; }
.hourly-item { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 44px; }
.hourly-hora { font-size: 10px; color: #A0A0A0; font-weight: 600; }
.hourly-icon { font-size: 16px; line-height: 1; }
.hourly-pct { font-size: 10px; font-weight: 700; }
.hourly-pct.rain-low { color: #A0A0A0; }
.hourly-pct.rain-mid { color: #64B5F6; }
.hourly-pct.rain-high { color: #1565C0; }
.hourly-temp { font-size: 10px; color: #6B6B6B; }

/* UBICACION */
.ubicacion-item { display:flex; align-items:flex-start; gap:12px; padding:12px 0; border-bottom:0.5px solid var(--gris5); }
.ubicacion-item:last-child { border-bottom:none; }
.ubicacion-dist { min-width:56px; text-align:center; }
.ubicacion-dist-num { font-size:16px; font-weight:700; color:var(--rojo); line-height:1; }
.ubicacion-dist-unit { font-size:10px; color:var(--gris4); }
.ubicacion-nombre { font-size:14px; font-weight:600; color:var(--negro); margin-bottom:2px; }
.ubicacion-hora { font-size:12px; color:var(--gris4); }
.ubicacion-maps { display:inline-flex; align-items:center; gap:4px; font-size:11px; color:#1a73e8; text-decoration:none; margin-top:4px; }

/* GASTOS */
.gastos-header { background:var(--negro); border-radius:12px; padding:16px; margin-bottom:16px; }
.gastos-dia-label { color:var(--gris4); font-size:11px; font-weight:700; letter-spacing:1px; margin-bottom:10px; }
.gastos-barra-wrap { background:var(--gris2); border-radius:20px; height:8px; margin-bottom:10px; overflow:hidden; }
.gastos-barra { height:8px; border-radius:20px; transition:width 0.4s; background:var(--verde); }
.gastos-barra.warn { background:var(--amarillo); }
.gastos-barra.over { background:var(--rojo); }
.gastos-nums { display:flex; justify-content:space-between; align-items:baseline; }
.gastos-gastado { color:white; font-size:22px; font-weight:700; }
.gastos-limite { color:var(--gris4); font-size:13px; }
.gastos-restante { font-size:12px; font-weight:600; margin-top:4px; }
.gastos-restante.ok { color:#81C784; }
.gastos-restante.warn { color:var(--amarillo); }
.gastos-restante.over { color:var(--rojo); }

.gastos-form { display:flex; gap:8px; margin-bottom:16px; }
.gastos-form input[type=text] { flex:1; padding:11px 12px; background:var(--gris6); border:0.5px solid var(--gris5); border-radius:10px; font-size:14px; color:var(--negro); outline:none; }
.gastos-form input[type=number] { width:80px; padding:11px 12px; background:var(--gris6); border:0.5px solid var(--gris5); border-radius:10px; font-size:14px; font-weight:700; color:var(--negro); outline:none; }
.gastos-form button { padding:11px 14px; background:var(--rojo); color:white; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; }

.gastos-lista { margin-bottom:20px; }
.gasto-item { display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:0.5px solid var(--gris5); }
.gasto-item:last-child { border-bottom:none; }
.gasto-desc { flex:1; font-size:14px; color:var(--negro); }
.gasto-monto { font-size:15px; font-weight:700; color:var(--negro); }
.gasto-delete { background:none; border:none; color:var(--gris4); font-size:18px; cursor:pointer; padding:0 4px; line-height:1; }
.gastos-empty { color:var(--gris4); font-size:13px; text-align:center; padding:20px 0; }

.gastos-day-nav { display:flex; gap:8px; overflow-x:auto; margin-bottom:16px; scrollbar-width:none; }
.gastos-day-nav::-webkit-scrollbar { display:none; }
.gastos-day-pill { flex-shrink:0; background:var(--gris6); border:0.5px solid var(--gris5); color:var(--gris3); font-size:12px; font-weight:600; padding:5px 12px; border-radius:20px; cursor:pointer; white-space:nowrap; }
.gastos-day-pill.active { background:var(--negro); color:white; border-color:var(--negro); }

/* MAPA */
.map-day-title { font-size: 13px; font-weight: 700; color: var(--negro); margin-bottom: 10px; letter-spacing: 0.3px; }
.map-frame { border-radius: 12px; overflow: hidden; border: 1px solid var(--gris5); margin-bottom: 20px; }
.map-frame iframe { width: 100%; height: 280px; border: none; display: block; }
.map-points { margin-bottom: 6px; }
.map-point { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--gris5); }
.map-point:last-child { border-bottom: none; }
.map-point-num { width: 20px; height: 20px; border-radius: 50%; background: var(--rojo); color: white; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.map-point-name { font-size: 13px; color: var(--negro); font-weight: 500; }
.map-point-hora { font-size: 11px; color: var(--gris4); margin-top: 1px; }
.map-select { width: 100%; padding: 10px 14px; background: var(--negro); border: none; border-radius: 10px; color: white; font-size: 14px; margin-bottom: 16px; outline: none; appearance: none; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-header-top">
    <div>
      <div class="app-title">NYC <span>2026</span></div>
      <div class="app-dates">29 MAYO — 7 JUNIO</div>
    </div>
    <div class="header-right">
      <div class="weather-badge" id="headerWeather">
        <span class="weather-icon" id="headerIcon">⏳</span>
        <span id="headerTemp">—</span>
      </div>
    </div>
  </div>
  <div class="days-nav" id="daysNav"></div>
</div>

<div class="extra-tabs">
  <button class="extra-tab active" id="tab-btn-itinerario" onclick="setTab('itinerario')">Itinerario</button>
  <button class="extra-tab" id="tab-btn-clima" onclick="setTab('clima')">Clima</button>
  <button class="extra-tab" id="tab-btn-shekel" onclick="setTab('shekel')">₪ Shekel</button>
  <button class="extra-tab" id="tab-btn-mapa" onclick="setTab('mapa')">Mapa</button>
  <button class="extra-tab" id="tab-btn-ubicacion" onclick="setTab('ubicacion')">📍</button>
  <button class="extra-tab" id="tab-btn-gastos" onclick="setTab('gastos')">$</button>
</div>

<div id="tab-itinerario" class="panel active">
  <div id="content"></div>
</div>

<div id="tab-clima" class="panel">
  <div id="climaContent"><p class="clima-loading">Cargando pronóstico...</p></div>
</div>

<div id="tab-shekel" class="panel">
  <div class="conv-section">
    <div class="conv-label">TIPO DE CAMBIO</div>
    <div class="conv-rate-bar">
      <div>
        <div class="conv-rate-num">1 USD = <span id="rateNum">—</span> ₪</div>
        <div class="conv-updated" id="rateUpdated">Cargando...</div>
      </div>
    </div>
    <div class="conv-label">CONVERTIR</div>
    <div class="conv-inputs">
      <div class="conv-field">
        <label>USD $</label>
        <input type="number" id="inputUSD" placeholder="0" oninput="convertFrom('usd')">
      </div>
      <div class="conv-field">
        <label>ILS ₪</label>
        <input type="number" id="inputILS" placeholder="0" oninput="convertFrom('ils')">
      </div>
    </div>
    <div class="conv-label">REFERENCIA RÁPIDA</div>
    <div class="conv-tips" id="convTips">
      <div class="clima-loading">Cargando...</div>
    </div>
  </div>
</div>

<div id="tab-ubicacion" class="panel">
  <div id="ubicacionContent">
    <p class="clima-loading">Tocá el botón para ver qué tan lejos estás de cada lugar del día.</p>
  </div>
  <div style="padding:0 0 16px;">
    <button onclick="getLocation()" style="width:100%;padding:14px;background:var(--negro);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;">Detectar mi ubicación</button>
  </div>
</div>

<div id="tab-gastos" class="panel">
  <div id="gastosContent"></div>
</div>

<div id="tab-mapa" class="panel">
  <div class="conv-label">ELEGÍ UN DÍA</div>
  <select class="map-select" id="mapSelect" onchange="renderMap()"></select>
  <div id="mapContent"></div>
</div>

function saveChecks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(checks)); }
function isChecked(dayId, idx) { return !!checks[dayId+'_'+idx]; }

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.extra-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-btn-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab === 'clima') { if (!weatherData) loadWeather(); else renderWeatherPanelForDay(); }
  if (tab === 'shekel' && !usdIls) loadRate();
  if (tab === 'mapa') renderMap();
  if (tab === 'ubicacion') document.getElementById('ubicacionContent').innerHTML = '<p class="clima-loading">Tocá el botón para ver qué tan lejos estás de cada lugar del día.</p>';
  if (tab === 'gastos') { gastosActivoDia = activeDayId; renderGastos(); }
}

function setDay(id) {
  activeDayId = id;
  renderNav();
  updateHeaderWeather();
  if (activeTab === 'itinerario') renderItinerario();
  else if (activeTab === 'clima') { if (!weatherData) loadWeather(); else renderWeatherPanelForDay(); }
  else if (activeTab === 'mapa') renderMap();
  window.scrollTo({top:0, behavior:'smooth'});
}

async function loadWeather() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=40.7128&longitude=-74.0060&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&hourly=temperature_2m,precipitation_probability,weathercode&timezone=America/New_York&start_date=2026-05-29&end_date=2026-06-07';
    const r = await fetch(url);
    const json = await r.json();
    weatherData = json.daily;
    weatherHourly = json.hourly;
    renderWeatherPanel();
    updateHeaderWeather();
    // si el usuario cambió de día mientras cargaba, actualizar ahora
    renderNav();
  } catch(e) {
    document.getElementById('climaContent').innerHTML = '<p class="clima-loading">No se pudo cargar el pronóstico. Intentá de nuevo más tarde.</p>';
  }
}

function getWeatherForDate(dateStr) {
  if (!weatherData) return null;
  const idx = weatherData.time.indexOf(dateStr);
  if (idx === -1) return null;
  return {
    max: Math.round(weatherData.temperature_2m_max[idx]),
    min: Math.round(weatherData.temperature_2m_min[idx]),
    rain: weatherData.precipitation_probability_max[idx],
    code: weatherData.weathercode[idx]
  };
}

function getHourlyForDate(dateStr) {
  if (!weatherHourly) return [];
  const result = [];
  weatherHourly.time.forEach((t, i) => {
    if (t.startsWith(dateStr)) {
      const hour = parseInt(t.split('T')[1]);
      if (hour >= 7 && hour <= 23) {
        result.push({
          hour,
          label: hour + ':00',
          temp: Math.round(weatherHourly.temperature_2m[i]),
          rain: weatherHourly.precipitation_probability[i],
          code: weatherHourly.weathercode[i]
        });
      }
    }
  });
  return result;
}

function buildHourlyHTML(dateStr) {
  const hours = getHourlyForDate(dateStr);
  if (!hours.length) return '';
  const html = hours.map(h => {
    const rainClass = h.rain >= 60 ? 'rain-high' : h.rain >= 30 ? 'rain-mid' : 'rain-low';
    return `<div class="hourly-item">
      <div class="hourly-hora">${h.label}</div>
      <div class="hourly-icon">${WMO_ICON[h.code]||'🌡️'}</div>
      <div class="hourly-pct ${rainClass}">${h.rain}%</div>
      <div class="hourly-temp">${h.temp}°</div>
    </div>`;
  }).join('');
  return `<div class="hourly-title">HORA A HORA (07:00–23:00)</div>
    <div class="hourly-scroll">${html}</div>`;
}

function renderWeatherPanel() {
  if (!weatherData) return;
  const dia = dias.find(d => d.id === activeDayId);
  const wActive = dia ? getWeatherForDate(dia.weatherDate) : null;

  const detailHTML = wActive ? `
    <div class="clima-card" style="margin-bottom:14px;border:2px solid #D62828;">
      <div class="clima-card-fecha">${dia.pill.toUpperCase()} — ${dia.titulo.toUpperCase()}</div>
      <div style="display:flex;align-items:center;gap:12px;margin:8px 0;">
        <div class="clima-card-icon" style="font-size:36px;margin:0;">${WMO_ICON[wActive.code]||'🌡️'}</div>
        <div>
          <div class="clima-card-temps" style="font-size:22px;">${wActive.max}° <span>/ ${wActive.min}°C</span></div>
          <div class="clima-card-desc">${(WMO[wActive.code]||'').replace(/[^\w\sáéíóúüñÁÉÍÓÚÜÑ,]/g,'').trim()}</div>
          <div class="clima-card-rain">💧 ${wActive.rain}% prob. lluvia</div>
        </div>
      </div>
      ${buildHourlyHTML(dia.weatherDate)}
    </div>` : '';

  const gridHTML = '<div class="clima-grid">' + dias.map(d => {
    const w = getWeatherForDate(d.weatherDate);
    if (!w) return '';
    const icon = WMO_ICON[w.code] || '🌡️';
    const isActive = d.id === activeDayId;
    return `<div class="clima-card" onclick="setDay('${d.id}')" style="cursor:pointer;${isActive ? 'opacity:0.5;' : ''}">
      <div class="clima-card-fecha">${d.pill.toUpperCase()}</div>
      <div class="clima-card-icon">${icon}</div>
      <div class="clima-card-temps">${w.max}° <span>/ ${w.min}°C</span></div>
      <div class="clima-card-rain">💧 ${w.rain}%</div>
    </div>`;
  }).join('') + '</div>';

  document.getElementById('climaContent').innerHTML = detailHTML + '<div class="hourly-title">TODOS LOS DÍAS</div>' + gridHTML;
}

function renderWeatherPanelForDay() {
  renderWeatherPanel();
}

function updateHeaderWeather() {
  const dia = dias.find(d => d.id === activeDayId);
  if (!dia) return;
  if (!weatherData) { document.getElementById('headerTemp').textContent = dia.pill; return; }
  const w = getWeatherForDate(dia.weatherDate);
  if (!w) return;
  document.getElementById('headerIcon').textContent = WMO_ICON[w.code] || '🌡️';
  document.getElementById('headerTemp').textContent = w.max + '°C';
}

async function loadRate() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const data = await r.json();
    usdIls = data.rates.ILS;
    const updated = new Date(data.time_last_update_utc).toLocaleDateString('es-AR', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    document.getElementById('rateNum').textContent = usdIls.toFixed(3);
    document.getElementById('rateUpdated').textContent = 'Actualizado: ' + updated;
    renderTips();
  } catch(e) {
    document.getElementById('rateUpdated').textContent = 'No se pudo cargar el tipo de cambio.';
  }
}

function convertFrom(from) {
  if (!usdIls) return;
  if (from === 'usd') {
    const usd = parseFloat(document.getElementById('inputUSD').value) || 0;
    document.getElementById('inputILS').value = usd ? (usd * usdIls).toFixed(0) : '';
  } else {
    const ils = parseFloat(document.getElementById('inputILS').value) || 0;
    document.getElementById('inputUSD').value = ils ? (ils / usdIls).toFixed(2) : '';
  }
}

  if (!usdIls) return;
  const refs = [
    {usd:1, label:'$1 USD'},
    {usd:2, label:'Propina mostrador Katz\'s'},

    {usd:20, label:'Entrada museo aprox.'},
    {usd:50, label:'Cena tranquila'},

  document.getElementById('convTips').innerHTML = refs.map(r =>
    `<div class="conv-tip-row">

      <span class="conv-tip-ils">₪${(r.usd * usdIls).toFixed(0)}</span>

function renderMap() {
  const sel = document.getElementById('mapSelect');
  sel.innerHTML = dias.map(d => `<option value="${d.id}">${d.num} — ${d.pill} — ${d.titulo}</option>`).join('');
  sel.value = activeDayId;
  const dia = dias.find(d => d.id === sel.value);
  if (!dia || !dia.bloques.length) {
    document.getElementById('mapContent').innerHTML = '<p class="clima-loading">Sin puntos para este día.</p>';
    return;
  }
  const puntos = dia.bloques.filter(b => b.lat);
  const centerLat = puntos.reduce((a,b) => a + b.lat, 0) / puntos.length;
  const centerLng = puntos.reduce((a,b) => a + b.lng, 0) / puntos.length;
  const query = puntos.map(p => `${p.lat},${p.lng}`).join('|');
  const mapsUrl = `https://maps.google.com/?q=${puntos[0].lat},${puntos[0].lng}`;

  document.getElementById('mapContent').innerHTML = `
    <div class="map-day-title">${dia.titulo.toUpperCase()} — ${dia.sub}</div>
    <div class="map-frame">
      <iframe src="https://maps.google.com/maps?q=${centerLat},${centerLng}&z=13&output=embed" allowfullscreen loading="lazy"></iframe>
    </div>
    <div class="map-points">
      ${puntos.map((p,i) => `
        <a class="map-point" href="https://maps.google.com/?q=${p.lat},${p.lng}" target="_blank" style="text-decoration:none;color:inherit;">
          <div class="map-point-num">${i+1}</div>
          <div>
            <div class="map-point-name">${p.titulo}</div>
            <div class="map-point-hora">${p.hora} · ${p.mapsLabel}</div>
          </div>
        </a>`).join('')}
    </div>`;
}

  document.getElementById('daysNav').innerHTML = dias.map(d =>
    `<button class="day-pill ${d.id===activeDayId?'active':''}" onclick="setDay('${d.id}')">${d.pill}</button>`
  ).join('');
}

function renderItinerario() {
  const dia = dias.find(d => d.id === activeDayId);
  if (!dia) return;

  const w = weatherData ? getWeatherForDate(dia.weatherDate) : null;
  const weatherHTML = w ? `
    <div class="day-weather">
      <div class="day-weather-icon">${WMO_ICON[w.code]||'🌡️'}</div>
      <div>
        <div class="day-weather-temps">${w.max}° / ${w.min}°C</div>
        <div class="day-weather-desc">${(WMO[w.code]||'').replace(/[^\w\sáéíóúüñÁÉÍÓÚÜÑ,]/g,'').trim()}</div>
      </div>
      <div class="day-weather-rain">
        <div class="day-weather-rain-pct">💧 ${w.rain}%</div>
        <div class="day-weather-rain-label">lluvia</div>
      </div>
    </div>` : '';

  const notaHTML = dia.nota && !dia.especial ? `
    <div class="day-nota"><p><strong>${dia.nota.label}:</strong> ${dia.nota.texto}</p></div>` : '';

  const bloquesHTML = dia.especial
    ? `<div class="evento-especial"><p>${dia.nota ? dia.nota.texto : ''}</p></div>`
    : `<p class="check-hint">Tocá un bloque para marcarlo como hecho</p>
       <div class="bloques">${dia.bloques.map((b,i) => buildBloqueHTML(dia.id,b,i)).join('')}</div>`;

  document.getElementById('content').innerHTML = `
    <div class="day-hero">
      <div class="day-num">${dia.num}</div>
      <div class="day-title">${dia.titulo}</div>
      <div class="day-sub">${dia.sub}</div>
      ${notaHTML}${weatherHTML}
    </div>
    ${bloquesHTML}`;

  updateHeaderWeather();
}

renderNav();
renderItinerario();
loadWeather();
loadRate();

// ── UBICACIÓN ──────────────────────────────────────────────────────────────
function getLocation() {
  const el = document.getElementById('ubicacionContent');
  el.innerHTML = '<p class="clima-loading">Obteniendo ubicación...</p>';
  if (!navigator.geolocation) {
    el.innerHTML = '<p class="clima-loading">Tu navegador no soporta geolocalización.</p>';
    return;
  }
  navigator.geolocation.getCurrentPosition(pos => {
    renderUbicacion(pos.coords.latitude, pos.coords.longitude);
  }, () => {
    el.innerHTML = '<p class="clima-loading">No se pudo obtener la ubicación. Asegurate de dar permiso.</p>';
  });
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function renderUbicacion(myLat, myLng) {
  const dia = dias.find(d => d.id === activeDayId);
  if (!dia) return;
  const puntos = dia.bloques.filter(b => b.lat).map(b => ({
    ...b,
    dist: haversine(myLat, myLng, b.lat, b.lng)
  })).sort((a,b) => a.dist - b.dist);

  const formatDist = d => d < 1000 ? Math.round(d) + ' m' : (d/1000).toFixed(1) + ' km';
  const formatMins = d => {
    const mins = Math.round(d / 80);
    return mins < 60 ? mins + ' min caminando' : Math.round(mins/60) + 'h ' + (mins%60) + 'min';
  };

  const html = `
    <p style="font-size:12px;color:var(--gris4);margin-bottom:14px;">Puntos del día ordenados por distancia desde tu ubicación actual.</p>
    <div class="gastos-lista">
      ${puntos.map(p => `
        <div class="ubicacion-item">
          <div class="ubicacion-dist">
            <div class="ubicacion-dist-num">${formatDist(p.dist)}</div>
            <div class="ubicacion-dist-unit">${formatMins(p.dist)}</div>
          </div>
          <div style="flex:1">
            <div class="ubicacion-nombre">${p.titulo}</div>
            <div class="ubicacion-hora">${p.hora}</div>
            <a class="ubicacion-maps" href="https://maps.google.com/?saddr=${myLat},${myLng}&daddr=${p.lat},${p.lng}&dirflg=w" target="_blank">Cómo llegar →</a>
          </div>
        </div>`).join('')}
    </div>`;

  document.getElementById('ubicacionContent').innerHTML = html;
}

// ── GASTOS ────────────────────────────────────────────────────────────────
const GASTOS_KEY = 'nyc2026_gastos';
const LIMITE_DIA = 80;
let gastosActivoDia = activeDayId;

function loadGastos() {
  try { return JSON.parse(localStorage.getItem(GASTOS_KEY) || '{}'); } catch(e) { return {}; }
}
function saveGastos(g) { localStorage.setItem(GASTOS_KEY, JSON.stringify(g)); }

function getGastosDia(dayId) {
  const all = loadGastos();
  return all[dayId] || [];
}

function addGasto() {
  const desc = document.getElementById('gastoDesc').value.trim();
  const monto = parseFloat(document.getElementById('gastoMonto').value);
  if (!desc || !monto || monto <= 0) return;
  const all = loadGastos();
  if (!all[gastosActivoDia]) all[gastosActivoDia] = [];
  all[gastosActivoDia].push({ desc, monto, id: Date.now() });
  saveGastos(all);
  document.getElementById('gastoDesc').value = '';
  document.getElementById('gastoMonto').value = '';
  renderGastos();
}

function deleteGasto(dayId, id) {
  const all = loadGastos();
  all[dayId] = (all[dayId] || []).filter(g => g.id !== id);
  saveGastos(all);
  renderGastos();
}

function renderGastos() {
  const lista = getGastosDia(gastosActivoDia);
  const total = lista.reduce((s, g) => s + g.monto, 0);
  const pct = Math.min(100, (total / LIMITE_DIA) * 100);
  const barraClass = pct >= 100 ? 'over' : pct >= 75 ? 'warn' : '';
  const restante = LIMITE_DIA - total;
  const restLabel = restante >= 0
    ? `Te quedan $${restante.toFixed(2)} de $${LIMITE_DIA}`
    : `Pasaste el límite por $${Math.abs(restante).toFixed(2)}`;
  const restClass = restante < 0 ? 'over' : restante < 20 ? 'warn' : 'ok';

  const diaActual = dias.find(d => d.id === gastosActivoDia);

  const navHTML = '<div class="gastos-day-nav">' +
    dias.map(d => `<button class="gastos-day-pill ${d.id===gastosActivoDia?'active':''}" onclick="setGastosDia('${d.id}')">${d.pill}</button>`).join('') +
    '</div>';

  const headerHTML = `
    <div class="gastos-header">
      <div class="gastos-dia-label">${diaActual ? diaActual.pill.toUpperCase() + ' — COMIDA' : ''} · LÍMITE $${LIMITE_DIA}/DÍA</div>
      <div class="gastos-barra-wrap"><div class="gastos-barra ${barraClass}" style="width:${pct}%"></div></div>
      <div class="gastos-nums">
        <div>
          <div class="gastos-gastado">$${total.toFixed(2)}</div>
          <div class="gastos-restante ${restClass}">${restLabel}</div>
        </div>
        <div class="gastos-limite">de $${LIMITE_DIA}</div>
      </div>
    </div>`;

  const formHTML = `
    <div class="gastos-form">
      <input type="text" id="gastoDesc" placeholder="Descripción (ej: Katz's)" maxlength="40">
      <input type="number" id="gastoMonto" placeholder="$0" min="0" step="0.01">
      <button onclick="addGasto()">+</button>
    </div>`;

  const listaHTML = lista.length === 0
    ? '<p class="gastos-empty">Sin gastos cargados para este día.</p>'
    : '<div class="gastos-lista">' + lista.map(g => `
        <div class="gasto-item">
          <div class="gasto-desc">${g.desc}</div>
          <div class="gasto-monto">$${g.monto.toFixed(2)}</div>
          <button class="gasto-delete" onclick="deleteGasto('${gastosActivoDia}',${g.id})">×</button>
        </div>`).join('') + '</div>';

  document.getElementById('gastosContent').innerHTML = navHTML + headerHTML + formHTML + listaHTML;
}

function setGastosDia(id) {
  gastosActivoDia = id;
  renderGastos();
}
</script>
