<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NYC 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --rojo: #D62828;
    --negro: #0D0D0D;
    --gris1: #1A1A1A;
    --gris2: #2E2E2E;
    --gris3: #6B6B6B;
    --gris4: #A0A0A0;
    --gris5: #E8E6E1;
    --gris6: #F5F3EE;
    --blanco: #FAFAF8;
    --amarillo: #F5C518;
    --verde: #2E7D32;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--blanco);
    color: var(--negro);
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
  }

  /* HEADER */
  .app-header {
    background: var(--negro);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .app-title { color: white; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
  .app-title span { color: var(--rojo); }
  .app-dates { color: var(--gris4); font-size: 12px; margin-top: 4px; letter-spacing: 0.5px; }
  .app-badge {
    background: var(--rojo);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  /* NAV DÍAS */
  .days-nav {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .days-nav::-webkit-scrollbar { display: none; }
  .day-pill {
    flex-shrink: 0;
    background: var(--gris2);
    border: none;
    color: var(--gris4);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .day-pill.active {
    background: var(--rojo);
    color: white;
  }
  .day-pill.done {
    background: var(--gris2);
    color: var(--verde);
  }

  /* CONTENIDO */
  .content { padding: 0 0 40px; }

  /* DÍA */
  .day-section { display: none; }
  .day-section.active { display: block; }

  /* HERO DEL DÍA */
  .day-hero {
    background: var(--negro);
    padding: 24px 20px 20px;
    border-bottom: 2px solid var(--rojo);
  }
  .day-num { color: var(--rojo); font-size: 11px; font-weight: 700; letter-spacing: 2px; margin-bottom: 4px; }
  .day-title { color: white; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; margin-bottom: 6px; }
  .day-sub { color: var(--gris4); font-size: 13px; line-height: 1.4; }
  .day-nota {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.06);
    border-left: 2px solid var(--amarillo);
    border-radius: 0 6px 6px 0;
  }
  .day-nota p { color: var(--gris4); font-size: 12px; line-height: 1.5; }
  .day-nota strong { color: var(--amarillo); }

  /* LISTA BLOQUES */
  .bloques { padding: 0 20px; }

  /* TRAMO CAMINANDO */
  .tramo-walk {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0 6px 44px;
    color: var(--gris3);
    font-size: 12px;
  }
  .tramo-walk svg { flex-shrink: 0; }

  /* BLOQUE */
  .bloque {
    display: flex;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 0.5px solid var(--gris5);
    cursor: pointer;
    position: relative;
    transition: opacity 0.2s;
  }
  .bloque:last-child { border-bottom: none; }
  .bloque.checked { opacity: 0.45; }
  .bloque-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 30px;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .bloque-hora {
    font-size: 11px;
    font-weight: 700;
    color: var(--rojo);
    letter-spacing: 0.3px;
    white-space: nowrap;
    text-align: center;
    line-height: 1.2;
  }
  .bloque-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gris5);
    border: 1.5px solid var(--gris4);
    margin-top: 6px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .bloque.checked .bloque-dot {
    background: var(--verde);
    border-color: var(--verde);
  }
  .bloque-body { flex: 1; min-width: 0; }
  .bloque-titulo {
    font-size: 15px;
    font-weight: 600;
    color: var(--negro);
    margin-bottom: 3px;
    line-height: 1.3;
  }
  .bloque.checked .bloque-titulo {
    text-decoration: line-through;
    color: var(--gris3);
  }
  .bloque-desc {
    font-size: 13px;
    color: var(--gris3);
    line-height: 1.5;
    margin-bottom: 6px;
  }
  .bloque-maps {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 500;
    color: #1a73e8;
    text-decoration: none;
    padding: 3px 8px;
    border: 0.5px solid #c5d9f7;
    border-radius: 20px;
    background: #f0f6ff;
  }
  .bloque-maps svg { flex-shrink: 0; }

  /* OPCIONES (noche abierta etc) */
  .opciones { margin-top: 8px; }
  .opcion {
    display: flex;
    gap: 8px;
    padding: 8px 10px;
    margin-bottom: 6px;
    background: var(--gris6);
    border-radius: 8px;
    border-left: 2px solid var(--gris5);
  }
  .opcion-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--rojo);
    letter-spacing: 0.5px;
    white-space: nowrap;
    padding-top: 1px;
  }
  .opcion-text { font-size: 12px; color: var(--gris3); line-height: 1.4; }

  /* EVENTO ESPECIAL */
  .evento-especial {
    margin: 30px 20px;
    padding: 24px;
    background: var(--negro);
    border-radius: 12px;
    text-align: center;
  }
  .evento-especial p { color: var(--gris4); font-size: 14px; line-height: 1.6; }

  /* CHECK FEEDBACK */
  .check-hint {
    text-align: center;
    color: var(--gris4);
    font-size: 11px;
    padding: 12px 20px 0;
    letter-spacing: 0.3px;
  }
</style>

function loadChecks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e) { return {}; }
}

function saveChecks(checks) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checks));
}

let checks = loadChecks();
let activeDayId = dias[0].id;

function toggleCheck(dayId, idx) {
  const key = dayId + '_' + idx;
  checks[key] = !checks[key];
  saveChecks(checks);
  render();
}

function isChecked(dayId, idx) {
  return !!checks[dayId + '_' + idx];
}

function buildWalkHTML(walk) {
  if (!walk) return '';
  return `<div class="tramo-walk">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2"/><path d="M8 12l2-4 2 1 2-4"/><path d="M7 20l2-6h6l2 6"/></svg>
    <span>${walk.desde} · <strong>${walk.dist}</strong> · ${walk.mins} caminando</span>
  </div>`;
}

function buildOpcionesHTML(opciones) {
  if (!opciones || !opciones.length) return '';
  return '<div class="opciones">' + opciones.map(o =>
    `<div class="opcion">
      <span class="opcion-label">${o.label}</span>
      <span class="opcion-text">${o.texto}</span>
    </div>`
  ).join('') + '</div>';
}

function buildBloqueHTML(dayId, bloque, idx) {

    <div class="bloque ${checked ? 'checked' : ''}" onclick="toggleCheck('${dayId}', ${idx})">
      <div class="bloque-left">
        <div class="bloque-hora">${bloque.hora.replace(':', '<br>')}</div>
        <div class="bloque-dot"></div>
      </div>
      <div class="bloque-body">
        <div class="bloque-titulo">${bloque.titulo}</div>
        <div class="bloque-desc">${bloque.desc}</div>
        ${bloque.opciones ? buildOpcionesHTML(bloque.opciones) : ''}
        <a class="bloque-maps" href="${bloque.maps}" target="_blank" onclick="event.stopPropagation()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${bloque.mapsLabel}
        </a>
      </div>
    </div>`;
}

function render() {
  const nav = document.getElementById('daysNav');
  const content = document.getElementById('content');

  nav.innerHTML = dias.map(d => {
    const isActive = d.id === activeDayId;
    return `<button class="day-pill ${isActive ? 'active' : ''}" onclick="setDay('${d.id}')">${d.pill}</button>`;
  }).join('');

  content.innerHTML = dias.map(d => {
    const isActive = d.id === activeDayId;
    const notaHTML = d.nota ? `
      <div class="day-nota">
        <p><strong>${d.nota.label}:</strong> ${d.nota.texto}</p>
      </div>` : '';

    const bloquesHTML = d.especial
      ? `<div class="evento-especial"><p>${d.nota ? d.nota.texto : ''}</p></div>`
      : `<p class="check-hint">Tocá un bloque para marcarlo como hecho</p>
         <div class="bloques">${d.bloques.map((b, i) => buildBloqueHTML(d.id, b, i)).join('')}</div>`;

    return `
      <div class="day-section ${isActive ? 'active' : ''}" id="day-${d.id}">
        <div class="day-hero">
          <div class="day-num">${d.num}</div>
          <div class="day-title">${d.titulo}</div>
          <div class="day-sub">${d.sub}</div>
          ${d.nota && !d.especial ? notaHTML : ''}
        </div>
        ${bloquesHTML}
      </div>`;
  }).join('');
}

function setDay(id) {
  activeDayId = id;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
</body>
</html>
